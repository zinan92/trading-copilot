name: Daily Market Review

on:
  schedule:
    # Run at 9:30 AM ET (13:30 UTC) on weekdays
    - cron: '30 13 * * 1-5'
  workflow_dispatch: # Manual trigger

permissions:
  discussions: write

jobs:
  morning-review:
    runs-on: ubuntu-latest
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      APP_URL: https://trading-skills-catalog-xbb3.vercel.app
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Generate Morning Review
        id: review
        run: |
          DATE=$(date -u +"%Y-%m-%d")

          # Call Trading Copilot API for morning review
          RESPONSE=$(curl -s -X POST "$APP_URL/api/chat" \
            -H "Content-Type: application/json" \
            -d "{
              \"message\": \"Give me a morning market review: 1. US index performance 2. Key sector rotation 3. Today's focus items 4. Action recommendations. Be concise and direct.\",
              \"provider\": \"minimax\",
              \"history\": []
            }" --max-time 90 2>/dev/null || echo "")

          # Extract text from SSE stream
          CONTENT=$(echo "$RESPONSE" | grep '^data: ' | sed 's/^data: //' | \
            python3 -c "
          import sys, json
          parts = []
          for line in sys.stdin:
              line = line.strip()
              if not line or line == '[DONE]':
                  continue
              try:
                  d = json.loads(line)
                  if d.get('type') == 'text':
                      parts.append(d['text'])
              except:
                  pass
          print(''.join(parts))
          ")

          if [ -z "$CONTENT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$CONTENT" > /tmp/review.md
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Post to GitHub Discussions
        if: steps.review.outputs.skip != 'true'
        run: |
          DATE="${{ steps.review.outputs.date }}"
          BODY=$(cat /tmp/review.md)
          TITLE="Morning Review — $DATE"

          REPO_ID=$(gh api "repos/$REPO" --jq .node_id)
          CAT_ID=$(gh api "repos/$REPO/discussions/categories" --jq '.[0].node_id // empty' 2>/dev/null || echo "")

          if [ -z "$CAT_ID" ]; then
            echo "Discussions not enabled or no categories found. Printing review to log instead:"
            echo "---"
            echo "$BODY"
            exit 0
          fi

          gh api graphql -f query='
            mutation($repositoryId: ID!, $categoryId: ID!, $title: String!, $body: String!) {
              createDiscussion(input: {repositoryId: $repositoryId, categoryId: $categoryId, title: $title, body: $body}) {
                discussion { url }
              }
            }
          ' \
            -f repositoryId="$REPO_ID" \
            -f categoryId="$CAT_ID" \
            -f title="$TITLE" \
            -f body="$BODY"
